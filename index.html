        function initSparkles() {
            sparkleCanvas.width = window.innerWidth;
            sparkleCanvas.height = window.innerHeight;
            const ctx = sparkleCanvas.getContext('2d');
            const particles = [];

            class SparkleParticle {
                constructor() {
                    this.x = Math.random() * sparkleCanvas.width;
                    this.y = Math.random() * sparkleCanvas.height;
                    this.size = Math.random() * 2.5 + 1;
                    this.speedX = Math.random() * 0.1 - 0.05;
                    this.speedY = -(Math.random() * 0.15 + 0.05); 
                    this.opacity = Math.random() * 0.6 + 0.3;
                    this.phase = Math.random() * 100;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.y < -20) {
                        this.y = sparkleCanvas.height + 20;
                        this.x = Math.random() * sparkleCanvas.width;
                    }
                }
                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    let pulseOpacity = this.opacity * (0.4 + Math.sin(Date.now() * 0.003 + this.phase) * 0.6);
                    ctx.fillStyle = `rgba(255, 255, 255, ${pulseOpacity})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#ffffff";
                    ctx.beginPath();
                    for (let i = 0; i < 4; i++) {
                        ctx.rotate(Math.PI / 2);
                        ctx.lineTo(0, this.size * 4.5);
                        ctx.lineTo(this.size * 0.9, 0);
                    }
                    ctx.fill();
                    ctx.restore();
                }
            }

            for(let i=0; i<25; i++) particles.push(new SparkleParticle());

            function loop() {
                ctx.clearRect(0, 0, sparkleCanvas.width, sparkleCanvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                sparkleAnimationId = requestAnimationFrame(loop);
            }
            loop();
        }
        initSparkles();

        function showErrorMessage(message) {
            errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
            setTimeout(() => {
                errorContainer.innerHTML = '';
            }, 4000);
        }

        // ============================================
        // أحداث الأزرار والتفاعل
        // ============================================
        
        startQuizBtn.addEventListener('click', () => {
            soundManager.unlockMobileAudio();
            
            threeContainer.classList.add('dimmed-smoke');
            sparkleCanvas.style.opacity = "0.6"; 

            introVideo.muted = false;
            introVideo.currentTime = 0;
            introVideo.play().catch(e => {
                showErrorMessage('فشل تشغيل الفيديو. تأكد من وجود الملف.');
                console.error('خطأ تشغيل الفيديو:', e);
            });

            setTimeout(() => {
                quizBox.classList.add('quiz-pull-out');
            }, 2500); 
        });

        introVideo.addEventListener('ended', () => {
            welcomeScreen.classList.add('hidden');
            questionScreen.classList.remove('hidden');
            overlayLayer.classList.remove('welcome-overlay');
            
            threeContainer.classList.add('hidden'); 
            sparkleCanvas.classList.add('hidden');
            bgLayer.style.opacity = "1";

            quizBox.classList.remove('quiz-pull-out');
            quizBox.classList.add('quiz-pull-in-prepare');
            
            soundManager.playWelcome();

            setTimeout(() => {
                quizBox.style.transition = '';
                loadQuestion();
            }, 50);
        });

        function loadQuestion() {
            const currentData = quizData[currentQuestionIndex];
            quizBox.classList.remove('quiz-pull-out', 'quiz-pull-in-prepare');
            bgLayer.classList.remove('bg-blur-effect');
            
            bgLayer.style.backgroundImage = `url('${currentData.image}')`;
            questionText.innerText = currentData.question;
            optionsContainer.innerHTML = '';

            currentData.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.classList.add('option-btn');
                button.innerText = option;
                button.setAttribute('aria-label', `الخيار: ${option}`);
                button.addEventListener('click', (e) => handleAnswer(e, index));
                optionsContainer.appendChild(button);
            });

            isAnswering = false;
        }

        function handleAnswer(e, selectedIndex) {
            if (isAnswering) return; // منع الإجابات المتعددة
            isAnswering = true;

            const selectedButton = e.target;
            const allButtons = optionsContainer.querySelectorAll('.option-btn');
            const currentData = quizData[currentQuestionIndex];

            totalScore += currentData.scores[selectedIndex];
            soundManager.playClick();
            selectedButton.classList.add('btn-selected');

            allButtons.forEach(btn => { if (btn !== selectedButton) btn.classList.add('disabled'); });

            setTimeout(() => {
                quizBox.classList.add('quiz-pull-out');
                bgLayer.classList.add('bg-blur-effect');

                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex < quizData.length) {
                        quizBox.style.transition = 'none';
                        quizBox.classList.remove('quiz-pull-out');
                        quizBox.classList.add('quiz-pull-in-prepare');
                        setTimeout(() => {
                            quizBox.style.transition = '';
                            loadQuestion();
                        }, 50);
                    } else {
                        showResults();
                    }
                }, 600);
            }, 600);
        }

        function triggerFastConfetti() {
            var duration = 2 * 1000; 
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 12, angle: 60, spread: 65, origin: { x: 0, y: 0.85 } });
                confetti({ particleCount: 12, angle: 120, spread: 65, origin: { x: 1, y: 0.85 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        function showResults() {
            questionScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            quizBox.style.transition = '';
            quizBox.classList.remove('quiz-pull-out', 'quiz-pull-in-prepare');
            overlayLayer.classList.add('welcome-overlay'); 
            
            let finalCalculatedScore = (totalScore / 6).toFixed(1);
            let resultWord = "";
            let resultDescription = "";
            
            if (finalCalculatedScore >= 91.1 && finalCalculatedScore <= 100.0) {
                document.body.classList.add('mode-glow-bg');
                resultWord = "Pink Glow";
                resultDescription = "Freshness, confidence, and care are clearly part of your daily whisper energy, a little care keeps it unforgettable.";
                triggerFastConfetti();
            } else if (finalCalculatedScore >= 70.0 && finalCalculatedScore <= 91.0) {
                document.body.classList.add('mode-balance-bg');
                resultWord = "Pink Balance";
                resultDescription = "small daily details may be affecting your whisper freshness and confidence more than you notice, it only needs the right touch.";
            } else if (finalCalculatedScore < 70.0) {
                document.body.classList.add('mode-revival-bg');
                resultWord = "Pink Revival";
                resultDescription = "Your whisper is ready for a fresh beginning, one step could unlock your full Pink Glow.";
            }
            
            badgeContainer.innerText = resultWord;
            scoreContainer.innerText = `${finalCalculatedScore}%`;
            descriptionContainer.innerText = resultDescription;
        }

        // معالجة أخطاء عامة

        });

        window.addEventListener('unhandledrejection', (event) => {
