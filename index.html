<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Pink Dental Spa - Enter the PINK world</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Plus Jakarta Sans','Segoe UI',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    position:relative;
    background-color:#1a0511;
    overflow:hidden;
    transition:background 1s ease,background-color 1s ease;
    perspective:1000px;
}

#threeCanvasContainer{
    position:absolute;
    inset:0;
    z-index:1;
    opacity:1;
    transition:opacity 1.2s ease-in-out,filter 1.2s ease-in-out;
}

.dimmed-smoke{
    filter:brightness(0.4) contrast(1.1);
}

.bg-slider{
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    z-index:0;
    opacity:0;
    filter:blur(0px);
    transform:scale(1);
    transition:
    filter .8s cubic-bezier(0.4,0,0.2,1),
    transform .8s cubic-bezier(0.4,0,0.2,1),
    opacity 1s ease;

    will-change:transform,opacity,filter;
}

.bg-blur-effect{
    filter:blur(4px);
    transform:scale(1.03);
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.02);
    z-index:2;
}

.welcome-overlay{
    background:transparent !important;
}

#sparkleCanvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:3;
    pointer-events:none;
    transition:opacity .8s ease-in-out;
}

.quiz-container{
    position:relative;
    z-index:4;
    width:90%;
    max-width:480px;
    transition:
    transform .5s cubic-bezier(.34,1.56,.64,1),
    opacity .4s ease-in-out,
    filter .4s ease;

    will-change:transform,opacity,filter;
}

.card-box{
    background:#ffffff;
    border-radius:32px;
    padding:40px 30px;
    box-shadow:0 25px 60px rgba(180,20,100,.12);
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    position:relative;
    overflow:hidden;
}

.card-box::before{
    content:'';
    position:absolute;
    inset:-30px;
    background:
    radial-gradient(circle,
    rgba(255,20,147,0.18),
    transparent 70%);
    filter:blur(40px);
    z-index:-1;
}

.welcome-screen{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.welcome-video{
    width:100%;
    max-width:380px;
    border-radius:20px;
    object-fit:cover;
    margin-bottom:35px;
    background:#000;
}

.main-title{
    font-family:'Playfair Display',serif;
    font-size:2.4rem;
    color:#2b353c;
    line-height:1.25;
    margin-bottom:25px;
    direction:ltr;
}

.sub-title{
    font-size:1.05rem;
    color:#9aa4ac;
    line-height:1.6;
    margin-bottom:40px;
    direction:ltr;
    text-align:center;
}

.start-btn{
    background:linear-gradient(to left,#ff00cc,#ffc0cb);
    border:none;
    padding:16px 45px;
    border-radius:20px;
    color:#fff;
    font-size:1.15rem;
    font-weight:600;
    cursor:pointer;
    width:90%;
    max-width:290px;
    box-shadow:0 10px 25px rgba(255,0,204,.25);
    transition:.3s;
}

.start-btn:hover{
    transform:scale(1.03);
}

.question-screen{
    width:100%;
}

.progress-bar{
    width:100%;
    height:8px;
    background:rgba(255,255,255,.12);
    border-radius:999px;
    overflow:hidden;
    margin-bottom:30px;
    backdrop-filter:blur(10px);
}

.progress-fill{
    height:100%;
    width:0%;
    border-radius:999px;
    background:linear-gradient(to right,#ff00cc,#ffc0cb);
    transition:width .5s ease;
}

h2{
    margin-bottom:40px;
    font-size:1.5rem;
    line-height:1.6;
    font-weight:700;
    color:#fff;
    text-shadow:0 2px 8px rgba(0,0,0,.8);
}

.options-list{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.option-btn{
    background:rgba(255,20,147,.18);
    border:1px solid rgba(255,20,147,.4);
    padding:20px 24px;
    border-radius:20px;
    color:#fff;
    font-size:1.1rem;
    font-weight:600;
    cursor:pointer;
    text-align:right;
    transition:.3s cubic-bezier(.25,1,.5,1);
}

.option-btn:hover{
    background:rgba(255,20,147,.45);
    border-color:rgba(255,20,147,.8);
    transform:scale(1.02);
}

button:focus-visible{
    outline:3px solid #fff;
    outline-offset:4px;
}

.quiz-pull-out{
    transform:scale(.92) translateY(20px);
    filter:blur(6px);
    opacity:0;
}

.quiz-pull-in-prepare{
    transform:scale(1.08);
    opacity:0;
    transition:none;
}

@keyframes glassSelected{
    0%{
        background:rgba(255,20,147,.45);
    }
    100%{
        background:#ff1493;
        transform:scale(1.04);
        box-shadow:0 10px 25px rgba(255,20,147,.35);
    }
}

.btn-selected{
    animation:glassSelected .4s cubic-bezier(.25,1,.5,1) forwards;
    pointer-events:none;
}

.disabled{
    pointer-events:none;
    opacity:.15;
    transform:scale(.96);
}

.hidden{
    display:none !important;
}

.mode-glow-bg{
    background:radial-gradient(circle,#ffc0cb 0%,#ff69b4 100%) !important;
}

.mode-balance-bg{
    background:linear-gradient(135deg,#2c1a24 0%,#ff69b4 100%) !important;
}

.mode-revival-bg{
    background:radial-gradient(circle,#1a0813 0%,#4a1535 100%) !important;
}

.result-intro{
    font-size:1.3rem;
    font-weight:700;
    color:#ff1493;
    margin-bottom:8px;
}

.result-badge{
    font-size:3.4rem;
    font-weight:900;
    color:#fff;
    margin-bottom:10px;
}

.result-score{
    font-size:1.4rem;
    color:rgba(255,255,255,.85);
    margin-bottom:25px;
}

.result-description{
    color:#fff;
    line-height:1.6;
    margin-bottom:35px;
    text-align:center;
}

.result-cta-text{
    color:#fff;
    line-height:1.6;
    text-align:center;
}

</style>
</head>

<body>

<div id="threeCanvasContainer"></div>

<div class="bg-slider" id="bg-layer"></div>

<div class="overlay welcome-overlay" id="overlay-layer"></div>

<canvas id="sparkleCanvas"></canvas>

<div class="quiz-container" id="quiz-box">

<div id="welcome-screen" class="welcome-screen">

<div class="card-box">

<video
class="welcome-video"
id="introVideo"
playsinline
muted
autoplay
preload="auto">

<source src="intro.mp4" type="video/mp4">

</video>

<div class="main-title">
Enter the PINK<br>world
</div>

<div class="sub-title">
Not everything needs to be said loud...
Some things are only Whispered
</div>

<button class="start-btn" id="start-quiz-btn">
Pink Whisper 🤍
</button>

</div>
</div>

<div id="question-screen" class="hidden">

<div class="progress-bar">
<div class="progress-fill" id="progress-fill"></div>
</div>

<h2 id="question-text"></h2>

<div class="options-list" id="options-container"></div>

</div>

<div id="result-screen" class="hidden">

<div class="result-intro">
Your Whisper result is:
</div>

<div id="badge-container" class="result-badge"></div>

<div id="score-container" class="result-score"></div>

<div id="description-container" class="result-description"></div>

<div class="result-cta-text">
Send us your Whisper result (a screenshot)
and unlock your Pink Spa experience 💗
</div>

</div>

</div>

<script>

const appState = {
    currentQuestionIndex:0,
    totalScore:0,
    sparkleAnimationId:null,
    smokeAnimationId:null,
    isAudioUnlocked:false
};

const clickSound = new Audio('click.mp3');
clickSound.onerror = () => console.log("click sound missing");

const welcomeSound = new Audio('welcome.mp3');
welcomeSound.onerror = () => console.log("welcome sound missing");

const quizData = [

{
question:"كم مرة تشرب قهوة او شاي يوميا؟",
options:["ولا مرة","مرة او مرتان","من ثلاث الى خمس مرات","عايش عليها"],
scores:[100,70,35,0],
image:"bg1.png"
},

{
question:"هل تدخن؟",
options:["لا","احيانا","يوميا","عدة باكيتات باليوم"],
scores:[100,70,35,0],
image:"bg2.png"
},

{
question:"هل تشرب ماء كافي يوميا؟",
options:["نعم","أحياناً","لا"],
scores:[100,50,0],
image:"bg3.png"
},

{
question:"احد عرض عليك علكة او نعناع بشكل مفاجئ؟",
options:["لا","احيانا","مرات متكررة"],
scores:[100,50,0],
image:"bg4.png"
},

{
question:"تحس بجفاف بالفم؟",
options:["نادرا","احيانا","دائما"],
scores:[100,50,0],
image:"bg5.png"
},

{
question:"تحس الناس تبتعد و انت تحجي؟",
options:["لا","يمكن","صارت اكثر من مرة"],
scores:[100,50,0],
image:"bg6.png"
}

];

const quizBox = document.getElementById('quiz-box');
const bgLayer = document.getElementById('bg-layer');
const overlayLayer = document.getElementById('overlay-layer');
const questionText = document.getElementById('question-text');
const optionsContainer = document.getElementById('options-container');
const progressFill = document.getElementById('progress-fill');

const welcomeScreen = document.getElementById('welcome-screen');
const questionScreen = document.getElementById('question-screen');
const resultScreen = document.getElementById('result-screen');

const badgeContainer = document.getElementById('badge-container');
const scoreContainer = document.getElementById('score-container');
const descriptionContainer = document.getElementById('description-container');

const sparkleCanvas = document.getElementById('sparkleCanvas');

const startQuizBtn = document.getElementById('start-quiz-btn');

const introVideo = document.getElementById('introVideo');

const threeContainer = document.getElementById('threeCanvasContainer');

function unlockMobileAudio(){

    if(appState.isAudioUnlocked) return;

    [clickSound,welcomeSound].forEach(sound=>{

        const playPromise = sound.play();

        if(playPromise !== undefined){

            playPromise.then(()=>{
                sound.pause();
                sound.currentTime = 0;
            }).catch(()=>{});

        }

    });

    appState.isAudioUnlocked = true;
}

quizData.forEach(data=>{
    const img = new Image();
    img.src = data.image;
});

let scene,camera,renderer,smokeMaterial;
let clock = new THREE.Clock();

const vertexShaderCode = `
varying vec2 vUv;

void main(){
    vUv = uv;
    gl_Position = vec4(position,1.0);
}
`;

const fragmentShaderCode = `

uniform vec2 u_resolution;
uniform float u_time;
uniform sampler2D u_texture;

varying vec2 vUv;

vec2 distort(vec2 p,float t){

    p.x += sin(p.y * 6.0 + t * 0.5) * 0.03;
    p.x += cos(p.x * 8.0 + t * 0.2) * 0.02;

    p.y += cos(p.x * 5.0 + t * 0.35) * 0.025;
    p.y += sin(p.y * 7.0 + t * 0.15) * 0.015;

    return p;
}

void main(){

    vec2 st = gl_FragCoord.xy / u_resolution.xy;

    vec2 uv1 = distort(st,u_time);
    vec2 uv2 = distort(st,u_time * -0.7 + 5.0);

    vec4 texColor1 = texture2D(u_texture,uv1);
    vec4 texColor2 = texture2D(u_texture,uv2);

    vec4 finalSmoke = mix(texColor1,texColor2,0.45);

    gl_FragColor = vec4(finalSmoke.rgb,finalSmoke.a * 0.98);
}
`;

function initThreeSmoke(){

    scene = new THREE.Scene();

    camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

    renderer = new THREE.WebGLRenderer({
        antialias:true,
        alpha:true
    });

    renderer.setSize(window.innerWidth,window.innerHeight);

    threeContainer.appendChild(renderer.domElement);

    const textureLoader = new THREE.TextureLoader();

    const smokeTexture = textureLoader.load('1000455138.webp');

    smokeTexture.wrapS = THREE.RepeatWrapping;
    smokeTexture.wrapT = THREE.RepeatWrapping;

    smokeMaterial = new THREE.ShaderMaterial({

        vertexShader:vertexShaderCode,
        fragmentShader:fragmentShaderCode,

        uniforms:{
            u_time:{value:1.0},
            u_resolution:{
                value:new THREE.Vector2(
                    window.innerWidth,
                    window.innerHeight
                )
            },
            u_texture:{value:smokeTexture}
        },

        transparent:true
    });

    const geometry = new THREE.PlaneGeometry(2,2);

    const smokeMesh = new THREE.Mesh(geometry,smokeMaterial);

    scene.add(smokeMesh);

    animateThreeSmoke();
}

function animateThreeSmoke(){

    appState.smokeAnimationId =
    requestAnimationFrame(animateThreeSmoke);

    smokeMaterial.uniforms.u_time.value =
    clock.getElapsedTime();

    renderer.render(scene,camera);
}

initThreeSmoke();

function initSparkles(){

    sparkleCanvas.width = window.innerWidth;
    sparkleCanvas.height = window.innerHeight;

    const ctx = sparkleCanvas.getContext('2d');

    const particles = [];

    class SparkleParticle{

        constructor(){

            this.x = Math.random() * sparkleCanvas.width;
            this.y = Math.random() * sparkleCanvas.height;

            this.size = Math.random() * 2.5 + 1;

            this.speedX = Math.random() * .1 - .05;
            this.speedY = -(Math.random() * .15 + .05);

            this.opacity = Math.random() * .6 + .3;

            this.phase = Math.random() * 100;
        }

        update(){

            this.x += this.speedX;
            this.y += this.speedY;

            if(this.y < -20){

                this.y = sparkleCanvas.height + 20;
                this.x = Math.random() * sparkleCanvas.width;

            }
        }

        draw(){

            ctx.save();

            ctx.translate(this.x,this.y);

            let pulseOpacity =
            this.opacity *
            (.4 + Math.sin(Date.now() * .003 + this.phase) * .6);

            ctx.fillStyle =
            `rgba(255,255,255,${pulseOpacity})`;

            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ffffff";

            ctx.beginPath();

            for(let i=0;i<4;i++){

                ctx.rotate(Math.PI / 2);

                ctx.lineTo(0,this.size * 4.5);
                ctx.lineTo(this.size * .9,0);

            }

            ctx.fill();

            ctx.restore();
        }
    }

    for(let i=0;i<25;i++){

        particles.push(new SparkleParticle());

    }

    function loop(){

        ctx.clearRect(
            0,
            0,
            sparkleCanvas.width,
            sparkleCanvas.height
        );

        particles.forEach(p=>{
            p.update();
            p.draw();
        });

        appState.sparkleAnimationId =
        requestAnimationFrame(loop);
    }

    loop();
}

initSparkles();

document.addEventListener("visibilitychange",()=>{

    if(document.hidden){

        cancelAnimationFrame(appState.sparkleAnimationId);

        cancelAnimationFrame(appState.smokeAnimationId);

    }else{

        animateThreeSmoke();
        initSparkles();

    }

});

window.addEventListener('resize',()=>{

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

    smokeMaterial.uniforms.u_resolution.value.set(
        window.innerWidth,
        window.innerHeight
    );

    sparkleCanvas.width = window.innerWidth;
    sparkleCanvas.height = window.innerHeight;

});

function loadQuestion(){

    const currentData =
    quizData[appState.currentQuestionIndex];

    const progress =
    ((appState.currentQuestionIndex + 1)
    / quizData.length) * 100;

    progressFill.style.width = `${progress}%`;

    quizBox.classList.remove(
        'quiz-pull-out',
        'quiz-pull-in-prepare'
    );

    bgLayer.style.backgroundImage =
    `url('${currentData.image}')`;

    bgLayer.style.opacity = "1";

    questionText.innerText =
    currentData.question;

    optionsContainer.innerHTML = '';

    currentData.options.forEach((option,index)=>{

        const button =
        document.createElement('button');

        button.classList.add('option-btn');

        button.innerText = option;

        button.addEventListener('click',
        (e)=>handleAnswer(e,index));

        optionsContainer.appendChild(button);

    });
}

function handleAnswer(e,selectedIndex){

    const selectedButton = e.target;

    const allButtons =
    optionsContainer.querySelectorAll('.option-btn');

    const currentData =
    quizData[appState.currentQuestionIndex];

    appState.totalScore +=
    currentData.scores[selectedIndex];

    const clickClone =
    clickSound.cloneNode();

    clickClone.volume = .5;

    clickClone.play().catch(()=>{});

    selectedButton.classList.add('btn-selected');

    allButtons.forEach(btn=>{

        if(btn !== selectedButton){

            btn.classList.add('disabled');

        }

    });

    setTimeout(()=>{

        quizBox.classList.add('quiz-pull-out');

        bgLayer.classList.add('bg-blur-effect');

        setTimeout(()=>{

            appState.currentQuestionIndex++;

            if(
                appState.currentQuestionIndex
                < quizData.length
            ){

                quizBox.style.transition = 'none';

                quizBox.classList.remove(
                    'quiz-pull-out'
                );

                quizBox.classList.add(
                    'quiz-pull-in-prepare'
                );

                setTimeout(()=>{

                    quizBox.style.transition = '';

                    loadQuestion();

                },50);

            }else{

                showResults();

            }

        },600);

    },600);
}

function triggerFastConfetti(){

    let duration = 2000;

    let end = Date.now() + duration;

    (function frame(){

        confetti({

            particleCount:
            window.innerWidth < 768 ? 6 : 12,

            angle:60,
            spread:65,
            origin:{x:0,y:.85}

        });

        confetti({

            particleCount:
            window.innerWidth < 768 ? 6 : 12,

            angle:120,
            spread:65,
            origin:{x:1,y:.85}

        });

        if(Date.now() < end){

            requestAnimationFrame(frame);

        }

    })();
}

function showResults(){

    questionScreen.classList.add('hidden');

    resultScreen.classList.remove('hidden');

    overlayLayer.classList.add('welcome-overlay');

    let finalCalculatedScore = (

        appState.totalScore / quizData.length

    ).toFixed(1);

    let resultWord = "";
    let resultDescription = "";

    if(finalCalculatedScore >= 91.1){

        document.body.classList.add('mode-glow-bg');

        resultWord = "Pink Glow";

        resultDescription =
        "Freshness, confidence, and care are already part of your whisper energy.";

        triggerFastConfetti();

    }

    else if(finalCalculatedScore >= 70){

        document.body.classList.add('mode-balance-bg');

        resultWord = "Pink Balance";

        resultDescription =
        "Small daily details may be affecting your freshness more than you notice.";

    }

    else{

        document.body.classList.add('mode-revival-bg');

        resultWord = "Pink Revival";

        resultDescription =
        "Your whisper is ready for a fresh beginning.";

    }

    badgeContainer.innerText = resultWord;

    scoreContainer.innerText =
    `${finalCalculatedScore}%`;

    descriptionContainer.innerText =
    resultDescription;
}

startQuizBtn.addEventListener('click',()=>{

    unlockMobileAudio();

    threeContainer.classList.add('dimmed-smoke');

    sparkleCanvas.style.opacity = ".6";

    introVideo.muted = false;

    introVideo.currentTime = 0;

    introVideo.play().catch(()=>{});

    setTimeout(()=>{

        quizBox.classList.add('quiz-pull-out');

    },2500);

});

introVideo.addEventListener('ended',()=>{

    welcomeScreen.classList.add('hidden');

    questionScreen.classList.remove('hidden');

    overlayLayer.classList.remove('welcome-overlay');

    threeContainer.classList.add('hidden');

    sparkleCanvas.classList.add('hidden');

    quizBox.classList.remove('quiz-pull-out');

    quizBox.classList.add('quiz-pull-in-prepare');

    welcomeSound.currentTime = 0;

    welcomeSound.play().catch(()=>{});

    setTimeout(()=>{

        quizBox.style.transition = '';

        loadQuestion();

    },50);

});

</script>

</body>
</html>
