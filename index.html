<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Dental Spa - Enter the PINK world</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            background-color: #1a0511; 
            overflow: hidden;
            transition: background 1s ease, background-color 1s ease;
        }

        #threeCanvasContainer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            transition: opacity 1.2s ease-in-out, filter 1.2s ease-in-out;
            opacity: 1;
        }

        .dimmed-smoke {
            filter: brightness(0.4) contrast(1.1);
        }

        .bg-slider {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            opacity: 0; 
            filter: blur(0px);
            transform: scale(1);
            transition: filter 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s ease;
        }

        .bg-blur-effect {
            filter: blur(4px);
            transform: scale(1.03);
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.02); 
            z-index: 2;
            transition: background 1s ease;
        }

        .welcome-overlay {
            background: transparent !important;
        }

        #sparkleCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3; 
            pointer-events: none; 
            opacity: 1;
            transition: opacity 0.8s ease-in-out;
        }

        #particleCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .quiz-container {
            position: relative;
            z-index: 4;
            background: transparent; 
            border: none;
            padding: 20px;
            width: 90%;
            max-width: 480px;
            box-shadow: none;
            text-align: center;
            transform: scale(1);
            opacity: 1;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease-in-out;
        }

        .card-box {
            background: #ffffff;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 25px 60px rgba(180, 20, 100, 0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .card-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: 50%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255, 192, 203, 0.4) 0%, transparent 70%);
            transform: translateX(-50%);
            animation: shimmerPulse 4s ease-in-out infinite;
            pointer-events: none;
        }

        .card-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            right: 0; bottom: 0;
            border-radius: 32px;
            background: linear-gradient(45deg, rgba(255, 192, 203, 0.3) 0%, transparent 50%, rgba(255, 20, 147, 0.2) 100%);
            animation: glowBorder 3s ease-in-out infinite;
            pointer-events: none;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .welcome-video {
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            outline: none;
            background-color: #000;
            object-fit: cover;
            margin-bottom: 35px;
            position: relative;
            z-index: 1;
            animation: videoEntrance 0.8s cubic-bezier(0.215, 0.610, 0.355, 1);
        }

        @keyframes videoEntrance {
            from {
                opacity: 0;
                transform: scale(0.85);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .welcome-video::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            right: 0; bottom: 0;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.03),
                    rgba(0, 0, 0, 0.03) 1px,
                    transparent 1px,
                    transparent 2px
                );
            border-radius: 20px;
            pointer-events: none;
            opacity: 0.5;
            animation: filmGrain 0.2s infinite;
        }

        @keyframes filmGrain {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.6; }
        }

        .main-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2.4rem;
            color: #2b353c;
            font-weight: 600;
            line-height: 1.25;
            margin-bottom: 25px;
            text-shadow: none;
            direction: ltr;
            animation: titleGlow 2s ease-in-out infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes titleGlow {
            0%, 100% { 
                text-shadow: 0 0 10px rgba(255, 20, 147, 0);
                transform: scale(1);
            }
            50% { 
                text-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
                transform: scale(1.02);
            }
        }

        .sub-title {
            font-size: 1.05rem;
            color: #9aa4ac;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 500;
            max-width: 90%;
            direction: ltr;
            animation: fadeInUp 0.8s ease-out 0.2s both;
            position: relative;
            z-index: 1;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .start-btn {
            background: linear-gradient(to left, #ff00cc, #ffc0cb);
            border: none;
            padding: 16px 45px;
            border-radius: 20px;
            color: #ffffff; 
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(255, 0, 204, 0.25);
            direction: ltr;
            width: 90%;
            max-width: 290px;
            position: relative;
            z-index: 1;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            pointer-events: none;
        }

        .start-btn:active::before {
            width: 300px;
            height: 300px;
            transition: none;
        }

        .start-btn .heart-icon {
            font-size: 1.1rem;
            display: inline-block;
            line-height: 1;
            animation: heartBeat 1.5s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
        }

        .start-btn:hover, .start-btn:active {
            transform: scale(1.03);
            box-shadow: 0 12px 30px rgba(255, 0, 204, 0.35);
            opacity: 0.95;
        }

        .start-btn:focus {
            outline: 2px solid #ff1493;
            outline-offset: 2px;
        }

        .option-btn {
            position: relative;
            z-index: 100;
            background: rgba(255, 20, 147, 0.18); 
            border: 1px solid rgba(255, 20, 147, 0.4); 
            padding: 20px 24px;
            border-radius: 20px;
            color: #ffffff; 
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            text-align: right;
            width: 100%;
            outline: none;
            direction: rtl;
            overflow: hidden;
            animation: buttonSlideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        .option-btn:nth-child(1) { animation-delay: 0s; }
        .option-btn:nth-child(2) { animation-delay: 0.1s; }
        .option-btn:nth-child(3) { animation-delay: 0.2s; }
        .option-btn:nth-child(4) { animation-delay: 0.3s; }

        @keyframes buttonSlideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .option-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .option-btn:hover::before {
            left: 100%;
        }

        .option-btn:hover, .option-btn:active {
            background: rgba(255, 20, 147, 0.45); 
            border-color: rgba(255, 20, 147, 0.8);
            color: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(255, 20, 147, 0.25), 
                        0 0 20px rgba(255, 20, 147, 0.2);
        }

        .option-btn:focus {
            outline: 2px solid #ff1493;
            outline-offset: 2px;
        }

        .quiz-pull-out {
            transform: scale(0.92);
            opacity: 0;
        }

        .quiz-pull-in-prepare {
            transform: scale(1.08);
            opacity: 0;
            transition: none;
        }

        h2 {
            margin-bottom: 40px;
            font-size: 1.5rem;
            line-height: 1.6;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8), 0 1px 3px rgba(0, 0, 0, 0.9);
            direction: rtl;
            text-align: right;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        @keyframes glassSelected {
            0% { 
                background: rgba(255, 20, 147, 0.45);
                color: #ffffff;
                box-shadow: 0 8px 20px rgba(255, 20, 147, 0.25);
            }
            50% {
                transform: scale(1.08);
            }
            100% { 
                background: #ff1493;
                border-color: #ff1493;
                color: #ffffff;
                text-shadow: none;
                transform: scale(1.04);
                box-shadow: 0 0 40px rgba(255, 20, 147, 0.6), 
                            0 10px 25px rgba(255, 20, 147, 0.35);
            }
        }

        .btn-selected {
            animation: glassSelected 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            pointer-events: none;
        }

        .disabled {
            pointer-events: none;
            opacity: 0.15;
            transform: scale(0.96);
        }

        .hidden {
            display: none !important;
        }

        .mode-glow-bg {
            background: radial-gradient(circle, #ffc0cb 0%, #ff69b4 100%) !important;
            box-shadow: inset 0 0 80px rgba(255, 255, 255, 0.6);
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: inset 0 0 80px rgba(255, 255, 255, 0.6);
            }
            50% {
                box-shadow: inset 0 0 120px rgba(255, 255, 255, 0.8);
            }
        }

        .mode-balance-bg {
            background: linear-gradient(135deg, #2c1a24 0%, #ff69b4 100%) !important;
            animation: balanceShift 3s ease-in-out infinite;
        }

        @keyframes balanceShift {
            0%, 100% { background: linear-gradient(135deg, #2c1a24 0%, #ff69b4 100%); }
            50% { background: linear-gradient(135deg, #3d2634 0%, #ff79be 100%); }
        }

        .mode-revival-bg {
            background: radial-gradient(circle, #1a0813 0%, #4a1535 100%) !important;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.8);
            animation: revivalPulse 2.5s ease-in-out infinite;
        }

        @keyframes revivalPulse {
            0%, 100% { box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.8); }
            50% { box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.5); }
        }

        .mode-glow-bg #bg-layer, .mode-balance-bg #bg-layer, .mode-revival-bg #bg-layer {
            display: none !important;
        }

        .result-intro {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ff1493;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            direction: ltr;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.3);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .result-badge {
            font-size: 3.4rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.25);
            margin-bottom: 5px;
            direction: ltr;
            animation: badgeBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }

        @keyframes badgeBounce {
            0% {
                opacity: 0;
                transform: scale(0.3) rotateZ(-20deg);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateZ(0);
            }
        }

        .result-score {
            font-size: 1.4rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 25px;
            direction: ltr;
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }

        .result-description {
            font-size: 1.05rem;
            font-weight: 500;
            color: #ffffff;
            line-height: 1.6;
            padding: 0 15px;
            margin-bottom: 35px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.15);
            direction: ltr; 
            text-align: center;
            animation: fadeInUp 0.6s ease-out 0.5s both;
        }

        .result-cta-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.5;
            direction: ltr;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            padding: 0 10px;
            animation: softPulse 2.5s infinite ease-in-out;
        }

        @keyframes softPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        #result-screen {
            animation: fadeInResult 0.8s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
        }

        @keyframes fadeInResult {
            from { 
                opacity: 0; 
                transform: translateY(20px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0);
            }
        }

        .error-message {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff1493;
            color: #ffffff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            direction: ltr;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ff1493;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .main-title {
                font-size: 2rem;
            }
            .sub-title {
                font-size: 0.95rem;
            }
            h2 {
                font-size: 1.2rem;
            }
            .option-btn {
                font-size: 1rem;
                padding: 16px 20px;
            }
            .result-badge {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <div id="threeCanvasContainer"></div>
    <div class="bg-slider" id="bg-layer"></div>
    <div class="overlay welcome-overlay" id="overlay-layer"></div>
    <canvas id="sparkleCanvas"></canvas>
    <canvas id="particleCanvas"></canvas>

    <div class="quiz-container" id="quiz-box">
        <div id="welcome-screen" class="welcome-screen">
            <div class="card-box">
                <video class="welcome-video" id="introVideo" playsinline muted>
                    <source src="intro.mp4" type="video/mp4">
                    متصفحك لا يدعم تشغيل الفيديو.
                </video>
                <div class="main-title">Enter the PINK<br>world</div>
                <div class="sub-title">Not everything needs to be said loud...Some things are only Whispered</div>
                <button class="start-btn" id="start-quiz-btn" aria-label="ابدأ اختبار Pink Whisper">
                    <span>Pink Whisper</span>
                    <span class="heart-icon">🤍</span>
                </button>
                <div id="error-container"></div>
            </div>
        </div>

        <div id="question-screen" class="hidden">
            <h2 id="question-text">جاري تحضير تجربة الـ Spa...</h2>
            <div class="options-list" id="options-container"></div>
        </div>

        <div id="result-screen" class="hidden">
            <div class="result-intro">Your Whisper result is:</div>
            <div id="badge-container" class="result-badge"></div>
            <div id="score-container" class="result-score"></div>
            <div id="description-container" class="result-description"></div>
            <div class="result-cta-text">
                Send us your Whisper result (a screenshot)<br>and unlock your Pink Spa experience 💗
            </div>
        </div>
    </div>

    <script>
        // نظام إدارة الجزيئات
        const particleSystem = {
            canvas: document.getElementById('particleCanvas'),
            ctx: null,
            particles: [],
            
            init() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.ctx = this.canvas.getContext('2d');
                window.addEventListener('resize', () => {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                });
            },
            
            burstParticles(x, y, count = 30) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count;
                    const velocity = 3 + Math.random() * 3;
                    this.particles.push({
                        x, y,
                        vx: Math.cos(angle) * velocity,
                        vy: Math.sin(angle) * velocity,
                        life: 1,
                        size: 3 + Math.random() * 4,
                        color: `hsl(${320 + Math.random() * 40}, 100%, ${50 + Math.random() * 30}%)`
                    });
                }
            },
            
            update() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15;
                    p.life -= 0.015;
                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                        continue;
                    }
                    this.ctx.save();
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fillStyle = p.color;
                    this.ctx.shadowBlur = 10;
                    this.ctx.shadowColor = p.color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.restore();
                }
            },
            animate() {
                this.update();
                requestAnimationFrame(() => this.animate());
            }
        };
        particleSystem.init();
        particleSystem.animate();

        // إدارة الصوتيات
        const soundManager = {
            clickSound: new Audio('click.mp3'),
            welcomeSound: new Audio('welcome.mp3'),
            isAudioUnlocked: false,
            audioLoaded: { click: false, welcome: false },
            init() {
                this.clickSound.volume = 0.5;
                this.welcomeSound.volume = 0.7;
                this.clickSound.addEventListener('canplaythrough', () => { this.audioLoaded.click = true; }, { once: true });
                this.welcomeSound.addEventListener('canplaythrough', () => { this.audioLoaded.welcome = true; }, { once: true });
                [this.clickSound, this.welcomeSound].forEach(sound => {
                    sound.addEventListener('error', (e) => console.warn('خطأ تحميل الصوت:', e));
                });
            },
            unlockMobileAudio() {
                if (this.isAudioUnlocked) return;
                [this.clickSound, this.welcomeSound].forEach(sound => {
                    const playPromise = sound.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            sound.pause();
                            sound.currentTime = 0;
                        }).catch(() => {});
                    }
                });
                this.isAudioUnlocked = true;
            },
            playClick() {
                if (this.audioLoaded.click) {
                    this.clickSound.currentTime = 0;
                    this.clickSound.play().catch(() => {});
                }
            },
            playWelcome() {
                if (this.audioLoaded.welcome) {
                    this.welcomeSound.currentTime = 0;
                    this.welcomeSound.play().catch(() => {});
                }
            }
        };
        soundManager.init();

        // بيانات الأسئلة
        const quizData = [
            { question: "كم مرة تشرب قهوة او شاي يوميا؟", options: ["ولا مرة", "مرة او مرتان", "من ثلاث الى خمس مرات", "عايش عليها"], scores: [100, 70, 35, 0], image: "bg1.png" },
            { question: "هل تدخن؟", options: ["لا", "احيانا", "يوميا", "عدة باكيتات باليوم"], scores: [100, 70, 35, 0], image: "bg2.png" },
            { question: "هل تشرب ماء كافي يوميا؟", options: ["نعم", "أحياناً", "لا"], scores: [100, 50, 0], image: "bg3.png" },
            { question: "احد عرض عليك علكة او نعناع بشكل مفاجئ؟", options: ["لا", "احيانا", "مرات متكررة"], scores: [100, 50, 0], image: "bg4.png" },
            { question: "تحس بجفاف بالفم؟", options: ["نادرا", "احيانا", "دائما"], scores: [100, 50, 0], image: "bg5.png" },
            { question: "تحس الناس تبتعد و انت تحجي؟", options: ["لا", "يمكن", "صارت اكثر من مرة"], scores: [100, 50, 0], image: "bg6.png" }
        ];

        function preloadImages() {
            quizData.forEach(data => {
                const img = new Image();
                img.onerror = () => console.warn(`فشل تحميل الصورة: ${data.image}`);
                img.src = data.image;
            });
        }
        preloadImages();

        // متغيرات الحالة
        let currentQuestionIndex = 0, totalScore = 0, sparkleAnimationId = null, isAnswering = false;

        // عناصر DOM
        const quizBox = document.getElementById('quiz-box');
        const bgLayer = document.getElementById('bg-layer');
        const overlayLayer = document.getElementById('overlay-layer');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const errorContainer = document.getElementById('error-container');
        const welcomeScreen = document.getElementById('welcome-screen');
        const questionScreen = document.getElementById('question-screen');
        const resultScreen = document.getElementById('result-screen');
        const badgeContainer = document.getElementById('badge-container');
        const scoreContainer = document.getElementById('score-container');
        const descriptionContainer = document.getElementById('description-container');
        const sparkleCanvas = document.getElementById('sparkleCanvas');
        const startQuizBtn = document.getElementById('start-quiz-btn');
        const introVideo = document.getElementById('introVideo');
        const threeContainer = document.getElementById('threeCanvasContainer');

        // معالجة الأخطاء
        introVideo.addEventListener('error', (e) => {
            console.error('خطأ الفيديو:', e);
            showErrorMessage('عذراً، فشل تحميل الفيديو. الرجاء تحديث الصفحة.');
        });

        function showErrorMessage(message) {
            errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
            setTimeout(() => errorContainer.innerHTML = '', 4000);
        }

        // Three.js Smoke
        let scene, camera, renderer, smokeMaterial, smokeMesh, clock = new THREE.Clock(), smokeInitialized = false;

        const vertexShaderCode = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShaderCode = `
            uniform vec2 u_resolution;
            uniform float u_time;
            uniform sampler2D u_texture;
            varying vec2 vUv;
            vec2 distort(vec2 p, float t) {
                p.x += sin(p.y * 4.0 + t * 0.4) * 0.04;
                p.y += cos(p.x * 3.5 + t * 0.3) * 0.03;
                return p;
            }
            void main() {
                vec2 st = gl_FragCoord.xy / u_resolution.xy;
                vec2 uv1 = distort(st, u_time);
                vec2 uv2 = distort(st, u_time * -0.7 + 5.0);
                vec4 texColor1 = texture2D(u_texture, uv1);
                vec4 texColor2 = texture2D(u_texture, uv2);
                vec4 finalSmoke = mix(texColor1, texColor2, 0.45);
                gl_FragColor = vec4(finalSmoke.rgb, finalSmoke.a * 0.98);
            }
        `;

        function initThreeSmoke() {
            try {
                if (smokeInitialized) return;
                scene = new THREE.Scene();
                camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                threeContainer.appendChild(renderer.domElement);

                const textureLoader = new THREE.TextureLoader();
                const smokeTexture = textureLoader.load('1000455138.jpg', () => {
                    smokeTexture.wrapS = THREE.RepeatWrapping;
                    smokeTexture.wrapT = THREE.RepeatWrapping;
                    smokeInitialized = true;
                    animateThreeSmoke();
                }, undefined, (error) => {
                    console.warn('فشل تحميل صورة الدخان:', error);
                    smokeInitialized = true;
                });

                let uniforms = {
                    u_time: { value: 1.0 },
                    u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                    u_texture: { value: smokeTexture }
                };

                smokeMaterial = new THREE.ShaderMaterial({
                    vertexShader: vertexShaderCode,
                    fragmentShader: fragmentShaderCode,
                    uniforms: uniforms,
                    transparent: true
                });

                const geometry = new THREE.PlaneGeometry(2, 2);
                smokeMesh = new THREE.Mesh(geometry, smokeMaterial);
                scene.add(smokeMesh);
            } catch (error) {
                console.error('خطأ في تهيئة Three.js:', error);
                smokeInitialized = true;
            }
        }

        function animateThreeSmoke() {
            requestAnimationFrame(animateThreeSmoke);
            if(smokeMaterial) smokeMaterial.uniforms.u_time.value = clock.getElapsedTime();
            if(renderer) renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if(renderer && smokeMaterial) {
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                smokeMaterial.uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
            }
            sparkleCanvas.width = window.innerWidth;
            sparkleCanvas.height = window.innerHeight;
        });

        initThreeSmoke();

        // Sparkles
        function initSparkles() {
            sparkleCanvas.width = window.innerWidth;
            sparkleCanvas.height = window.innerHeight;
            const ctx = sparkleCanvas.getContext('2d');
            const particles = [];

            class SparkleParticle {
                constructor() {
                    this.x = Math.random() * sparkleCanvas.width;
                    this.y = Math.random() * sparkleCanvas.height;
                    this.size = Math.random() * 2.5 + 1;
                    this.speedX = Math.random() * 0.1 - 0.05;
                    this.speedY = -(Math.random() * 0.15 + 0.05);
                    this.opacity = Math.random() * 0.6 + 0.3;
                    this.phase = Math.random() * 100;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.y < -20) {
                        this.y = sparkleCanvas.height + 20;
                        this.x = Math.random() * sparkleCanvas.width;
                    }
                }
                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    let pulseOpacity = this.opacity * (0.4 + Math.sin(Date.now() * 0.003 + this.phase) * 0.6);
                    ctx.fillStyle = `rgba(255, 255, 255, ${pulseOpacity})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#ffffff";
                    ctx.beginPath();
                    for (let i = 0; i < 4; i++) {
                        ctx.rotate(Math.PI / 2);
                        ctx.lineTo(0, this.size * 4.5);
                        ctx.lineTo(this.size * 0.9, 0);
                    }
                    ctx.fill();
                    ctx.restore();
                }
            }

            for(let i=0; i<25; i++) particles.push(new SparkleParticle());

            function loop() {
                ctx.clearRect(0, 0, sparkleCanvas.width, sparkleCanvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                sparkleAnimationId = requestAnimationFrame(loop);
            }
            loop();
        }
        initSparkles();

        // أحداث الأزرار
        startQuizBtn.addEventListener('click', () => {
            soundManager.unlockMobileAudio();
            threeContainer.classList.add('dimmed-smoke');
            sparkleCanvas.style.opacity = "0.6";
            introVideo.muted = false;
            introVideo.currentTime = 0;
            introVideo.play().catch(e => {
                showErrorMessage('فشل تشغيل الفيديو. تأكد من وجود الملف.');
                console.error('خطأ تشغيل الفيديو:', e);
            });
            setTimeout(() => quizBox.classList.add('quiz-pull-out'), 2500);
        });

        introVideo.addEventListener('ended', () => {
            welcomeScreen.classList.add('hidden');
            questionScreen.classList.remove('hidden');
            overlayLayer.classList.remove('welcome-overlay');
            threeContainer.classList.add('hidden');
            sparkleCanvas.classList.add('hidden');
            bgLayer.style.opacity = "1";
            quizBox.classList.remove('quiz-pull-out');
            quizBox.classList.add('quiz-pull-in-prepare');
            soundManager.playWelcome();
            setTimeout(() => {
                quizBox.style.transition = '';
                loadQuestion();
            }, 50);
        });

        function loadQuestion() {
            const currentData = quizData[currentQuestionIndex];
            quizBox.classList.remove('quiz-pull-out', 'quiz-pull-in-prepare');
            bgLayer.classList.remove('bg-blur-effect');
            bgLayer.style.backgroundImage = `url('${currentData.image}')`;
            questionText.innerText = currentData.question;
            optionsContainer.innerHTML = '';
            currentData.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.classList.add('option-btn');
                button.innerText = option;
                button.setAttribute('aria-label', `الخيار: ${option}`);
                button.addEventListener('click', (e) => handleAnswer(e, index));
                optionsContainer.appendChild(button);
            });
            isAnswering = false;
        }

        function handleAnswer(e, selectedIndex) {
            if (isAnswering) return;
            isAnswering = true;
            const selectedButton = e.target;
            const allButtons = optionsContainer.querySelectorAll('.option-btn');
            const currentData = quizData[currentQuestionIndex];
            const rect = selectedButton.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top + rect.height / 2;
            particleSystem.burstParticles(x, y, 40);
            totalScore += currentData.scores[selectedIndex];
            soundManager.playClick();
            selectedButton.classList.add('btn-selected');
            allButtons.forEach(btn => { if (btn !== selectedButton) btn.classList.add('disabled'); });
            setTimeout(() => {
                quizBox.classList.add('quiz-pull-out');
                bgLayer.classList.add('bg-blur-effect');
                setTimeout(() => {
                    currentQuestionIndex++;
                    if (currentQuestionIndex < quizData.length) {
                        quizBox.style.transition = 'none';
                        quizBox.classList.remove('quiz-pull-out');
                        quizBox.classList.add('quiz-pull-in-prepare');
                        setTimeout(() => {
                            quizBox.style.transition = '';
                            loadQuestion();
                        }, 50);
                    } else {
                        showResults();
                    }
                }, 600);
            }, 600);
        }

        function triggerFastConfetti() {
            var duration = 2 * 1000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 12, angle: 60, spread: 65, origin: { x: 0, y: 0.85 } });
                confetti({ particleCount: 12, angle: 120, spread: 65, origin: { x: 1, y: 0.85 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        function showResults() {
            questionScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            quizBox.style.transition = '';
            quizBox.classList.remove('quiz-pull-out', 'quiz-pull-in-prepare');
            overlayLayer.classList.add('welcome-overlay');
            let finalCalculatedScore = (totalScore / 6).toFixed(1);
            let resultWord = "";
            let resultDescription = "";
            if (finalCalculatedScore >= 91.1 && finalCalculatedScore <= 100.0) {
                document.body.classList.add('mode-glow-bg');
                resultWord = "Pink Glow";
                resultDescription = "Freshness, confidence, and care are clearly part of your daily whisper energy, a little care keeps it unforgettable.";
                triggerFastConfetti();
            } else if (finalCalculatedScore >= 70.0 && finalCalculatedScore <= 91.0) {
                document.body.classList.add('mode-balance-bg');
                resultWord = "Pink Balance";
                resultDescription = "small daily details may be affecting your whisper freshness and confidence more than you notice, it only needs the right touch.";
            } else if (finalCalculatedScore < 70.0) {
                document.body.classList.add('mode-revival-bg');
                resultWord = "Pink Revival";
                resultDescription = "Your whisper is ready for a fresh beginning, one step could unlock your full Pink Glow.";
            }
            badgeContainer.innerText = resultWord;
            scoreContainer.innerText = `${finalCalculatedScore}%`;
            descriptionContainer.innerText = resultDescription;
        }

        window.addEventListener('error', (event) => console.error('خطأ عام:', event.error));
        window.addEventListener('unhandledrejection', (event) => console.error('وعد غير معالج:', event.reason));
    </script>
</body>
</html>
